name: Atualizar base SIOE

on:
  # Corre automaticamente toda segunda-feira às 6h (hora de Lisboa = UTC+1)
  schedule:
    - cron: '0 5 * * 1'

  # Permite correr manualmente no GitHub (Actions → Run workflow)
  workflow_dispatch:

jobs:
  download-sioe:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # precisa para fazer commit do sioe.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Correr download SIOE
        run: node scripts/download-sioe.mjs

      - name: Commit e push sioe.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sioe.json
          git diff --staged --quiet || git commit -m "chore: atualizar base SIOE [$(date +'%Y-%m-%d')]"
          git push
