name: Atualizar base SIOE

"on":
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  download-sioe:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Testar ligação ao SIOE
        run: |
          echo "A testar ligação ao servidor SIOE..."
          curl -v --max-time 10 "https://pr-wfssioe.dgaep.gov.pt/SIOEPublicService.svc" || echo "AVISO: Servidor não acessível"

      - name: Correr download SIOE
        run: node scripts/download-sioe.mjs

      - name: Verificar ficheiro criado
        run: |
          if [ -f "data/sioe.json" ]; then
            echo "✅ sioe.json criado com sucesso"
            wc -c data/sioe.json
          else
            echo "❌ sioe.json NÃO foi criado"
            exit 1
          fi

      - name: Commit e push sioe.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sioe.json
          git diff --staged --quiet && echo "Sem alterações" || git commit -m "chore: atualizar base SIOE [$(date +'%Y-%m-%d')]"
          git push
